# StackRadar — Full Stack Deployment
# Usage: docker-compose up --build
# Env:   Copy backend/.env.example → backend/.env and fill in keys

services:
  # ── PostgreSQL Database ──
  db:
    image: postgres:15-alpine
    container_name: stackradar_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-stackradar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stackradar_pass}
      POSTGRES_DB: ${POSTGRES_DB:-stackradar}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stackradar}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ──
  backend:
    build:
      context: ./backend
    container_name: stackradar_backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    volumes:
      - ./backend/logs:/app/logs
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-stackradar}:${POSTGRES_PASSWORD:-stackradar_pass}@db:5432/${POSTGRES_DB:-stackradar}
      - RUN_SCRAPER_INLINE=1
      - DOCKER_ENV=1
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # ── Next.js Frontend ──
  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    container_name: stackradar_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
