version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: stackradar_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-stackradar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stackradar_pass}
      POSTGRES_DB: ${POSTGRES_DB:-stackradar}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stackradar}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: stackradar_backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-stackradar}:${POSTGRES_PASSWORD:-stackradar_pass}@db:5432/${POSTGRES_DB:-stackradar}
      - RUN_SCRAPER_INLINE=0
      - DOCKER_ENV=1
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  scraper:
    build:
      context: ./backend
    container_name: stackradar_scraper
    command: python run_scraper.py
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-stackradar}:${POSTGRES_PASSWORD:-stackradar_pass}@db:5432/${POSTGRES_DB:-stackradar}
      - DOCKER_ENV=1
    depends_on:
      db:
        condition: service_healthy
    restart: always

volumes:
  postgres_data:
