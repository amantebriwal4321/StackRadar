name: CI — Lint & Type Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-lint:
    name: Backend Lint (Ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff

      - name: Ruff lint
        run: ruff check app/ --output-format github

      - name: Ruff format check
        run: ruff format --check app/

  frontend-typecheck:
    name: Frontend Type Check (TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Next.js build test
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: [backend-lint, frontend-typecheck]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build ./backend -t stackradar-backend:test

      - name: Build frontend image
        run: docker build ./frontend -t stackradar-frontend:test --build-arg NEXT_PUBLIC_API_URL=http://localhost:8000
